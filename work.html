<!DOCTYPE html>
<html>

<head>

<script src="https://unpkg.com/globe.gl"></script>

<style>

body{
    margin:0;
}

#globeViz{
    width:100%;
    height:700px;
}

@keyframes popup{
    from{
        opacity:0;
        transform:scale(0.8);
    }

    to{
        opacity:1;
        transform:scale(1);
    }
}

</style>

</head>

<body>

<div id="globeViz"></div>

<script>

const points = __POINTS__;

const globe = Globe()
(document.getElementById('globeViz'))

.globeImageUrl(
'https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg'
)

.bumpImageUrl(
'https://unpkg.com/three-globe/example/img/earth-topology.png'
)

.backgroundImageUrl(
'https://unpkg.com/three-globe/example/img/night-sky.png'
)

.pointsData(points)

.pointAltitude(0.01)

.pointRadius(0.08)

.pointColor(() => 'rgba(0,0,0,0)')

.pointLabel(d => `
<div style="
padding:14px;
background:rgba(20,20,20,0.95);
color:white;
border-radius:12px;
animation:popup .2s ease-in-out;
">
📍 ${d.name}<br>
🦠 Cases: ${d.cases.toLocaleString()}
</div>
`)

.animateIn(true);

globe.controls().autoRotate = true;
globe.controls().autoRotateSpeed = 0.15;

</script>

</body>

</html>
